<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis-Hitachi | Debug Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-xl font-bold text-red-700 mb-4 border-b pb-2">VKYC System Check</h1>
        
        <div id="status-list" class="space-y-3">
            <div id="check-camera" class="flex justify-between items-center p-3 bg-gray-50 rounded">
                <span>Camera</span>
                <span class="status-icon"><i class="fas fa-circle-notch fa-spin text-gray-300"></i></span>
            </div>
            <div id="check-mic" class="flex justify-between items-center p-3 bg-gray-50 rounded">
                <span>Microphone</span>
                <span class="status-icon"><i class="fas fa-circle-notch fa-spin text-gray-300"></i></span>
            </div>
            <div id="check-location" class="flex justify-between items-center p-3 bg-gray-50 rounded">
                <span>Location</span>
                <span class="status-icon"><i class="fas fa-circle-notch fa-spin text-gray-300"></i></span>
            </div>
        </div>

        <button onclick="runDiagnostic()" class="w-full mt-6 bg-red-700 text-white py-3 rounded-lg font-bold">
            Run Diagnostic
        </button>

        <div class="mt-8">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Debug Console</h3>
            <div id="debug-console" class="bg-black text-green-400 text-[10px] font-mono p-3 rounded-lg h-40 overflow-y-auto">
                > System initialized. Waiting for diagnostic...
            </div>
        </div>
    </div>

    <script>
        const log = (msg, isError = false) => {
            const consoleEl = document.getElementById('debug-console');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            consoleEl.innerHTML += `<div class="${isError ? 'text-red-400' : ''}">[${time}] ${msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        };

        const updateUI = (id, success) => {
            const el = document.getElementById(id).querySelector('.status-icon');
            el.innerHTML = success 
                ? '<i class="fas fa-check-circle text-green-500"></i>' 
                : '<i class="fas fa-times-circle text-red-500"></i>';
        };

        async function runDiagnostic() {
            log("Starting Diagnostic...");

            // 1. Check Camera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());
                log("Camera: SUCCESS");
                updateUI('check-camera', true);
            } catch (e) {
                log(`Camera ERROR: ${e.name} - ${e.message}`, true);
                updateUI('check-camera', false);
            }

            // 2. Check Mic
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                log("Microphone: SUCCESS");
                updateUI('check-mic', true);
            } catch (e) {
                log(`Mic ERROR: ${e.name} - ${e.message}`, true);
                updateUI('check-mic', false);
            }

            // 3. Check Location
            log("Requesting Geolocation...");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    log(`Location: SUCCESS (${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)})`);
                    updateUI('check-location', true);
                },
                (err) => {
                    log(`Location ERROR: Code ${err.code} - ${err.message}`, true);
                    updateUI('check-location', false);
                },
                { timeout: 5000 }
            );
        }
    </script>
</body>
</html>
